name: Bug report
description: Report a reproducible bug in TechBuddy
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include as much detail as possible.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Brief description of the issue
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a clear sequence of actions.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened?
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Device type
      options:
        - Mobile phone
        - Tablet
        - Desktop/laptop
        - Multiple
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: e.g., Chrome 135, Safari iOS 18
    validations:
      required: true
  - type: dropdown
    id: accessibility
    attributes:
      label: Accessibility impact
      options:
        - None
        - Minor
        - Moderate
        - Severe
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs/screenshots
      description: Paste stack traces or attach screenshots.
